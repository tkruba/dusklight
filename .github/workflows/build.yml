name: Build DuskLight

on:
  push:
    branches:
        - randomizer
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ────────────────────────────────────────────────────────
          - name: Linux (GCC, RelWithDebInfo)
            os: ubuntu-24.04
            preset: linux-default-relwithdebinfo

          - name: Linux (Clang, RelWithDebInfo)
            os: ubuntu-24.04
            preset: linux-clang-relwithdebinfo

          # ── macOS ────────────────────────────────────────────────────────
          - name: macOS (Clang, RelWithDebInfo)
            os: macos-latest
            preset: macos-default-relwithdebinfo

          # ── Windows ──────────────────────────────────────────────────────
          - name: Windows (MSVC, RelWithDebInfo)
            os: windows-latest
            preset: windows-msvc-relwithdebinfo

          - name: Windows (Clang-cl, RelWithDebInfo)
            os: windows-latest
            preset: windows-clang-relwithdebinfo

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Linux dependencies ───────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update && sudo apt install -y \
            build-essential \
            clang \
            cmake \
            curl \
            git \
            libasound2-dev \
            libclang-dev \
            libcurl4-openssl-dev \
            libdbus-1-dev \
            libfreetype-dev \
            libglu1-mesa-dev \
            libgtk-3-dev \
            libncurses5-dev \
            libpng-dev \
            libpulse-dev \
            libudev-dev \
            libvulkan-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            lld \
            ninja-build \
            python-is-python3 \
            python3 \
            python3-markupsafe \
            zlib1g-dev

      # ── macOS dependencies ───────────────────────────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake python@3

      # ── Windows dependencies ─────────────────────────────────────────────
      # CMake is pre-installed on GitHub-hosted Windows runners.
      # Python is also pre-installed; the step below ensures it is on PATH.
      - name: Set up Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # MSVC / Clang-cl are provided by Visual Studio on the runner.
      # We activate the Developer Command Prompt so cl.exe / clang-cl.exe
      # are on PATH for the CMake configure + build steps.
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ── Configure ────────────────────────────────────────────────────────
      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}

      # ── Upload artifacts ─────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dusklight-${{ matrix.preset }}
          # Adjust the path below if CMakePresets.json places output elsewhere
          path: build/${{ matrix.preset }}/
          if-no-files-found: warn
