# Patches for game objects that get spawned in

# City in the Sky
D_MN07:
  # Stage file objects
  Stage:
    # change the Savemem actor that changes Link's spawn position
    - action: patch
      name: Savmem
      parameters: 0x00000A03
      position:
        x: -15044.2919921875
        y: 0.0
        z: -11283.109375
      angle:
        x: 0xFFFF
        y: 0xFFFF
        z: 0x184D
      set id: 0xFFFF
      patch:
        parameters: 0x00000003
      layers:
        - 0

  # Room 6 - West Bridge
  6:
    # Delete argorok actor that normally breaks the bridge
    - action: delete
      name: dr
      parameters: 0x00000018
      position:
        x: -7075
        y: -200
        z: -11809.4033203125
      angle:
        x: 0x0000
        y: 0x8000
        z: 0x0000
      set id: 0xFFFF
      layers:
        - 0

# Palace of Twilight
D_MN08:
  # Room 0 - Main Entrance
  0:
    # Delete the invisible wall that blocks north access
    # This wall normally disappears when both sols are
    # placed, but we want players to be able to access
    # the north wing if they have Light Sword
    - action: delete
      name: ClearB
      parameters: 0x00003F81
      position:
        x: 255.0
        y: 1600.0
        z: 2560.0
      angle:
        x: 0x4000
        y: 0x0000
        z: 0x0000
      set id: 0xFFFF
      scale:
        x: 20
        y: 10
        z: 20
      layers:
        - 14

    # Delete the TagYami as well so midna doesn't prevent
    # the player from going north either
    - action: delete
      name: TagYami
      parameters: 0x00E6E502
      position:
        x: 250
        y: 800
        z: 5800
      angle:
        x: 0x0000
        y: 0x0000
        z: 0x0000
      set id: 0xFFFF
      scale:
        x: 100
        y: 50
        z: 100
      layers:
        - 14

